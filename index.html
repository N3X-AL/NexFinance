<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexFinance | Premium Wealth Management</title>
    <meta name="description" content="A comprehensive personal finance application for tracking wealth, budgets, and transactions.">
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body class="dark-theme">
    <div id="app-container">
        <!-- Sidebar Navigation -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="material-icons-round logo-icon">account_balance_wallet</span>
                    <h1>NexFinance</h1>
                </div>
            </div>
            <ul class="nav-links">
                <li class="active" data-route="dashboard">
                    <span class="material-icons-round">dashboard</span>
                    <span>Dashboard</span>
                </li>
                <li data-route="transactions">
                    <span class="material-icons-round">receipt_long</span>
                    <span>Transactions</span>
                </li>
                <li data-route="accounts">
                    <span class="material-icons-round">account_balance</span>
                    <span>Accounts</span>
                </li>
                <li data-route="budgets">
                    <span class="material-icons-round">pie_chart</span>
                    <span>Budgets</span>
                </li>
                <li data-route="loans">
                    <span class="material-icons-round">handshake</span>
                    <span>Loans</span>
                </li>
                <li data-route="investments">
                    <span class="material-icons-round">trending_up</span>
                    <span>Investments</span>
                </li>
                <li data-route="reports">
                    <span class="material-icons-round">bar_chart</span>
                    <span>Reports</span>
                </li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">N</div>
                    <div class="user-info">
                        <span class="user-name">User</span>
                        <span class="user-status">Premium</span>
                    </div>
                </div>
                <button class="settings-btn" data-route="settings">
                    <span class="material-icons-round">settings</span>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <header class="topbar">
                <div class="page-title">
                    <h2 id="current-page-title">Dashboard</h2>
                    <p id="current-page-subtitle">Welcome back, here's your financial overview.</p>
                </div>
                <div class="topbar-actions">
                    <div class="search-bar">
                        <span class="material-icons-round">search</span>
                        <input type="text" placeholder="Search transactions, accounts...">
                    </div>
                    <button class="icon-btn action-btn tooltip" data-tooltip="Notifications">
                        <span class="material-icons-round">notifications</span>
                        <span class="badge">3</span>
                    </button>
                    <button class="btn btn-primary" id="global-add-btn">
                        <span class="material-icons-round">add</span>
                        New Transaction
                    </button>
                </div>
            </header>

            <div id="view-container" class="scrollable-content">
                <!-- Dynamic Content Loads Here -->
            </div>
        </main>
    </div>

    <!-- Modals Container -->
    <div id="modal-container"></div>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/views.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
